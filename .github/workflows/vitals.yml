name: Generate Vitals

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Generate vitals SVG
        run: cd generator && go run main.go > ../assets/vitals.svg
        env:
          GITHUB_USER: sanki92
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/vitals.svg
          git diff --quiet --cached || git commit -m "update vitals"
          git push
